# LiveKit server config for PRODUCTION / self-hosted deployments (e.g. Coolify).
# Local docker-compose uses `--dev` instead (see docker-compose.yml) which is
# pre-tuned for localhost. In production this file is baked into a custom image
# (infra/livekit/Dockerfile) and started with `--config /etc/livekit/livekit.yaml`;
# keys are supplied via the LIVEKIT_KEYS environment variable (so no secrets live here).
port: 7880
log_level: info

rtc:
  # TCP fallback for restrictive networks.
  tcp_port: 7881
  # Single UDP mux port for media — far easier to expose through a firewall /
  # Coolify "Ports Mappings" than the default 50000-60000 range.
  udp_port: 7882
  # Advertise the host's public IP to clients (discovered via STUN). Required when
  # the server sits behind NAT, as it does on most cloud hosts.
  use_external_ip: true

# Embedded TURN over TLS — the firewall-friendly fallback for clients that can only
# reach the outside world over TLS (UDP/7882 and TCP/7881 blocked).
#
# DISABLED by default. The recommended way to enable it on Coolify needs NO manual cert:
# let Traefik terminate TLS with its automatic Let's Encrypt cert and forward plaintext
# to LiveKit (external_tls: true). Full walkthrough in the README ("TURN/TLS with an
# automatic Traefik cert"). In short:
#   1. DNS: point turn.example.com at the VPS public IP.
#   2. In Coolify, add turn.example.com as a domain on the `livekit` service — that makes
#      Coolify issue + auto-renew the cert. (No cert_file/key_file here.)
#   3. Add the Traefik TCP-router labels (see docker-compose.coolify.yml) so 443/SNI
#      forwards to LiveKit's TURN port.
#   4. Uncomment the block below and set `domain` to your real TURN hostname.
# turn:
#   enabled: true
#   domain: turn.example.com
#   # Port clients dial for turns:. 443 is the most firewall-friendly (the whole point of
#   # TURN/TLS); Traefik fronts it and forwards to LiveKit over the internal network.
#   tls_port: 443
#   # TLS is terminated upstream by Traefik, so LiveKit just listens for plain TCP and
#   # holds no cert. This is what makes the cert fully automatic + auto-renewed.
#   external_tls: true

# Keys are provided via the LIVEKIT_KEYS env var, e.g. "devkey: secret".
# keys:
#   <api-key>: <api-secret>

# A single-node PoC needs no Redis. Add a redis block for multi-node setups.
