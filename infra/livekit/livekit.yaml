# LiveKit server config for PRODUCTION / self-hosted deployments (e.g. Coolify).
# Local docker-compose uses `--dev` instead (see docker-compose.yml) which is
# pre-tuned for localhost. To use this file in production, mount it and start the
# server with `--config /etc/livekit/livekit.yaml`, and supply keys via the
# LIVEKIT_KEYS environment variable (so no secrets live in this file).
port: 7880
log_level: info

rtc:
  # TCP fallback for restrictive networks.
  tcp_port: 7881
  # Single UDP mux port for media — far easier to expose through a firewall /
  # Coolify "Ports Mappings" than the default 50000-60000 range.
  udp_port: 7882
  # Advertise the host's public IP to clients (discovered via STUN). Required when
  # the server sits behind NAT, as it does on most cloud hosts.
  use_external_ip: true

# Embedded TURN over TLS — the firewall-friendly fallback for clients that can only
# reach the outside world over TLS (UDP/7882 and TCP/7881 blocked). Published directly
# on the host (Coolify Ports Mappings: 5349:5349, opened in the firewall) — it does NOT
# go through Traefik.
turn:
  enabled: true
  # DNS name whose TLS cert LiveKit presents here. Point a record (e.g.
  # turn.example.com) at the host's public IP.
  domain: turn.example.com
  tls_port: 5349
  # LiveKit terminates TLS itself on 5349, so mount a cert + key and point to them.
  # (Alternative: put Traefik in TLS-passthrough in front and set external_tls: true
  # to let Traefik own the cert — then drop cert_file/key_file.)
  cert_file: /etc/livekit/turn/tls.crt
  key_file: /etc/livekit/turn/tls.key
  external_tls: false

# Keys are provided via the LIVEKIT_KEYS env var, e.g. "devkey: secret".
# keys:
#   <api-key>: <api-secret>

# A single-node PoC needs no Redis. Add a redis block for multi-node setups.
