# PoC stack: LiveKit media server + the Scout scoutkit-server (which serves both the web app
# and the REST API). Copy .env.example to .env first.
services:
  livekit:
    image: livekit/livekit-server:latest
    # `--dev` is pre-tuned for localhost and uses the devkey/secret pair (see .env.example).
    # For production: mount infra/livekit/livekit.yaml, set LIVEKIT_KEYS, and use
    #   command: --config /etc/livekit/livekit.yaml
    command: --dev --bind 0.0.0.0
    ports:
      - "7880:7880"        # signaling (ws/http)
      - "7881:7881"        # ICE / TCP fallback
      - "7882:7882/udp"    # media (UDP mux)
    restart: unless-stopped

  # PostgreSQL — the real database. Holds contacts, conversations and persistent chat (incl. the
  # full-text search index). Data survives restarts on the scoutkit-db volume.
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: scoutkit
      POSTGRES_USER: scoutkit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scoutkit}
    volumes:
      # PostgreSQL 18's image moved its default data dir to /var/lib/postgresql/18/docker.
      # Mount the parent /var/lib/postgresql so the volume covers the new layout (and any
      # future major-version subdir). Old PG<=17 stacks mounted .../data instead.
      - scoutkit-db:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scoutkit -d scoutkit"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Eclipse Scout RT backend. Serves the Scout JS web app at / and the REST API at /api
  # (LiveKit tokens + contacts + persistent chat). Schema is owned by Flyway, queried via jOOQ.
  scoutkit-server:
    build:
      context: .
      dockerfile: services/scoutkit-server/Dockerfile
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      # Browser-facing LiveKit URL (see .env). Local: ws://localhost:7880
      LIVEKIT_URL: ${LIVEKIT_URL}
      MEETING_DB_URL: jdbc:postgresql://postgres:5432/scoutkit
      MEETING_DB_USER: scoutkit
      MEETING_DB_PASSWORD: ${POSTGRES_PASSWORD:-scoutkit}
    ports:
      - "8080:8080"        # the single public entry point: web app + API
    depends_on:
      livekit:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  scoutkit-db:
