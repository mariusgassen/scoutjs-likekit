### Eclipse Scout application
scout.application.name=ScoutKit meeting-server
scout.application.version=0.1.0
scout.devMode=true

### Embedded Jetty listens on scout.app.port (default 8080).

### LiveKit token minting (override in production via env vars).
# Defaults match LiveKit's `--dev` devkey/secret pair.
meeting.livekit.apiKey=devkey
meeting.livekit.apiSecret=secret
# Access-token lifetime in seconds (6h).
meeting.livekit.tokenTtl=21600

### Persistence (PostgreSQL — the real database). Flyway migrates the schema on startup;
### queries go through jOOQ. Override these via env vars (MEETING_DB_*) in docker/Coolify.
### For local dev, run a PostgreSQL (e.g. `docker run -e POSTGRES_USER=scoutkit \
### -e POSTGRES_PASSWORD=scoutkit -e POSTGRES_DB=scoutkit -p 5432:5432 postgres:18-alpine`).
meeting.db.url=jdbc:postgresql://localhost:5432/scoutkit
meeting.db.user=scoutkit
meeting.db.password=scoutkit
