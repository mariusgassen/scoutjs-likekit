name: CodeQL

# Static security analysis for both halves of the stack.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, so newly disclosed query packs catch already-merged code.
    - cron: '24 6 * * 1'

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: java-kotlin
            # Manual: the Maven module lives under services/, so we drive the build explicitly.
            build-mode: manual
    steps:
      - uses: actions/checkout@v6
      - if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      # autobuild needs to find the Java module; point it at the Maven project.
      - if: matrix.language == 'java-kotlin'
        name: Build Java for analysis
        run: mvn -B -ntp -f services/scoutkit-server/pom.xml -DskipTests package
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
