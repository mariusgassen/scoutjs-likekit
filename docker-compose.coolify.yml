# Coolify deployment of the LiveKit PoC stack.
#
# Why this is separate from docker-compose.yml: the root compose is tuned for LOCAL
# dev — it binds host port 8080 for the web app and runs LiveKit with `--dev`. On a
# Coolify VPS that host bind collides with Coolify itself ("Bind for 0.0.0.0:8080
# failed: port is already allocated") and bypasses Traefik.
#
# Here instead:
#   - web & token-server are fronted by Coolify's Traefik via DOMAINS (no host ports).
#     Set the domains in the Coolify UI: a domain for `web` (the app) and one for
#     `livekit` signaling (-> wss://livekit.example.com).
#   - LiveKit runs the PRODUCTION config (infra/livekit/livekit.yaml) with TURN/TLS,
#     and publishes ONLY the media/TURN ports, which genuinely cannot go through Traefik.
services:
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit/livekit.yaml
    environment:
      # e.g. LIVEKIT_KEYS="my-key: my-secret"
      LIVEKIT_KEYS: ${LIVEKIT_KEYS}
    volumes:
      - ./infra/livekit/livekit.yaml:/etc/livekit/livekit.yaml:ro
      # TURN/TLS cert + key (tls.crt, tls.key) for port 5349. See README. Leave the
      # `turn:` block commented out in livekit.yaml until these exist, or LiveKit will
      # fail to start.
      - ./infra/livekit/turn:/etc/livekit/turn:ro
    # Signaling (7880) is proxied by Traefik via the `livekit` service domain — do NOT
    # publish it here. Only the media/TURN ports bypass Traefik and bind the host
    # (these are the Coolify "Ports Mappings" you opened in the firewall):
    ports:
      - "7881:7881"        # ICE / TCP fallback
      - "7882:7882/udp"    # media (UDP mux)
      - "5349:5349"        # TURN over TLS
    expose:
      - "7880"             # signaling — picked up by Traefik via the service domain
    restart: unless-stopped

  token-server:
    build:
      context: .
      dockerfile: services/token-server/Dockerfile
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      PORT: 3001
    # Internal only — the web app's nginx proxies /api/ to this service by name.
    expose:
      - "3001"
    depends_on:
      - livekit
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/demo/Dockerfile
    environment:
      # Browser-facing signaling URL — must be wss:// from an HTTPS page.
      LIVEKIT_URL: ${LIVEKIT_URL}
    # Fronted by Traefik via the `web` service domain — no host port binding (this is
    # what fixes the :8080 "port is already allocated" failure).
    expose:
      - "80"
    depends_on:
      - token-server
      - livekit
    restart: unless-stopped
