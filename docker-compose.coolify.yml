# Coolify deployment of the LiveKit PoC stack.
#
# Why this is separate from docker-compose.yml: the root compose is tuned for LOCAL
# dev — it binds host port 8080 for the web app and runs LiveKit with `--dev`. On a
# Coolify VPS that host bind collides with Coolify itself ("Bind for 0.0.0.0:8080
# failed: port is already allocated") and bypasses Traefik.
#
# Here instead:
#   - scoutkit-server (web app + API in one container) is fronted by Coolify's Traefik via
#     DOMAINS (no host ports). Set the domains in the Coolify UI: a domain for
#     `scoutkit-server` (the app) and one for `livekit` signaling (-> wss://livekit.example.com).
#   - LiveKit runs the PRODUCTION config (infra/livekit/livekit.yaml) with TURN/TLS,
#     and publishes ONLY the media/TURN ports, which genuinely cannot go through Traefik.
services:
  livekit:
    # Custom image with the production config baked in — see infra/livekit/Dockerfile.
    # We deliberately do NOT bind-mount the config: Coolify mis-resolves relative
    # bind-mount sources and Docker then creates a directory at the target, causing
    # "read /etc/livekit/livekit.yaml: is a directory".
    build:
      context: .
      dockerfile: infra/livekit/Dockerfile
    environment:
      # The LiveKit *server* reads its key pair from LIVEKIT_KEYS in "<key>: <secret>"
      # form. We build it from the same LIVEKIT_API_KEY / LIVEKIT_API_SECRET the
      # scoutkit-server uses (below), so you set just those two vars and both sides
      # automatically share one key pair. Do NOT also set LIVEKIT_KEYS yourself.
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    # Signaling (7880) is proxied by Traefik via the `livekit` service domain — do NOT
    # publish it here. Only the media ports bypass Traefik and bind the host
    # (these are the Coolify "Ports Mappings" you opened in the firewall):
    ports:
      - "7881:7881"        # ICE / TCP fallback
      - "7882:7882/udp"    # media (UDP mux)
    expose:
      - "7880"             # signaling — picked up by Traefik via the service domain
    restart: unless-stopped
    # --- TURN over TLS with an AUTOMATIC Traefik cert (disabled by default) ----------
    # No manual cert: Traefik terminates TLS with its Let's Encrypt cert and forwards
    # plaintext to LiveKit (livekit.yaml -> turn.external_tls: true). To enable:
    #   1. DNS: turn.example.com -> VPS public IP (keep port 80 reachable for ACME).
    #   2. Uncomment the `turn:` block in infra/livekit/livekit.yaml.
    #   3. Uncomment the labels below (set your real TURN hostname + Coolify's
    #      certresolver name — usually `letsencrypt`), then redeploy.
    # The cert is requested + auto-renewed by the tls.certresolver on the TCP router
    # below — do NOT add this hostname as a Coolify UI domain (that makes a conflicting
    # HTTP router). TURN routes via these labels, not a SERVICE_FQDN var. And because
    # Traefik reaches TURN over the internal Docker network, 5349 is NOT host-published.
    # labels:
    #   - "traefik.tcp.routers.turn.rule=HostSNI(`turn.example.com`)"
    #   - "traefik.tcp.routers.turn.entrypoints=https"   # 443
    #   - "traefik.tcp.routers.turn.tls=true"
    #   - "traefik.tcp.routers.turn.tls.certresolver=letsencrypt"
    #   - "traefik.tcp.routers.turn.service=turn"
    #   - "traefik.tcp.services.turn.loadbalancer.server.port=5349"

  # PostgreSQL — the real database. Internal only (no host ports, not fronted by Traefik).
  # Chat history + conversations persist on the scoutkit-db volume across redeploys.
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: scoutkit
      POSTGRES_USER: scoutkit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # PostgreSQL 18's image moved its default data dir to /var/lib/postgresql/18/docker.
      # Mount the parent /var/lib/postgresql so the volume covers the new layout (and any
      # future major-version subdir). Old PG<=17 stacks mounted .../data instead.
      - scoutkit-db:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scoutkit -d scoutkit"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Eclipse Scout RT backend — serves BOTH the web app (/) and the REST API (/api).
  # This is the only HTTP service: assign it the app domain in the Coolify UI and Traefik
  # fronts it (no host port binding, which avoids the :8080 "port is already allocated" clash).
  scoutkit-server:
    build:
      context: .
      dockerfile: services/scoutkit-server/Dockerfile
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      # Browser-facing signaling URL — must be wss:// from an HTTPS page.
      LIVEKIT_URL: ${LIVEKIT_URL}
      MEETING_DB_URL: jdbc:postgresql://postgres:5432/scoutkit
      MEETING_DB_USER: scoutkit
      MEETING_DB_PASSWORD: ${POSTGRES_PASSWORD}
    # Fronted by Traefik via the service domain — Coolify discovers the container port.
    expose:
      - "8080"
    depends_on:
      livekit:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  scoutkit-db:
