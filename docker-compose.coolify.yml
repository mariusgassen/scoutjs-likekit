# Coolify deployment of the LiveKit PoC stack.
#
# Why this is separate from docker-compose.yml: the root compose is tuned for LOCAL
# dev — it binds host port 8080 for the web app and runs LiveKit with `--dev`. On a
# Coolify VPS that host bind collides with Coolify itself ("Bind for 0.0.0.0:8080
# failed: port is already allocated") and bypasses Traefik.
#
# Here instead:
#   - web & token-server are fronted by Coolify's Traefik via DOMAINS (no host ports).
#     Set the domains in the Coolify UI: a domain for `web` (the app) and one for
#     `livekit` signaling (-> wss://livekit.example.com).
#   - LiveKit runs the PRODUCTION config (infra/livekit/livekit.yaml) with TURN/TLS,
#     and publishes ONLY the media/TURN ports, which genuinely cannot go through Traefik.
services:
  livekit:
    # Custom image with the production config baked in — see infra/livekit/Dockerfile.
    # We deliberately do NOT bind-mount the config: Coolify mis-resolves relative
    # bind-mount sources and Docker then creates a directory at the target, causing
    # "read /etc/livekit/livekit.yaml: is a directory".
    build:
      context: .
      dockerfile: infra/livekit/Dockerfile
    environment:
      # The LiveKit *server* reads its key pair from LIVEKIT_KEYS in "<key>: <secret>"
      # form. We build it from the same LIVEKIT_API_KEY / LIVEKIT_API_SECRET the
      # token-server uses (below), so you set just those two vars and both sides
      # automatically share one key pair. Do NOT also set LIVEKIT_KEYS yourself.
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
      # Coolify magic var: surfaces the signaling domain field for this service, routing
      # it to port 7880. Set it in the UI to e.g. https://livekit.example.com; the browser
      # then connects wss://livekit.example.com (LIVEKIT_URL on the web service).
      SERVICE_FQDN_LIVEKIT_7880: ""
    # Signaling (7880) is proxied by Traefik via the domain above — do NOT publish it
    # here. Only the media ports bypass Traefik and bind the host (these are the Coolify
    # "Ports Mappings" you opened in the firewall):
    ports:
      - "7881:7881"        # ICE / TCP fallback
      - "7882:7882/udp"    # media (UDP mux)
    expose:
      - "7880"             # signaling — picked up by Traefik via the service domain
    restart: unless-stopped
    # --- TURN over TLS with an AUTOMATIC Traefik cert (disabled by default) ----------
    # No manual cert: Traefik terminates TLS with its Let's Encrypt cert and forwards
    # plaintext to LiveKit (livekit.yaml -> turn.external_tls: true). To enable:
    #   1. DNS: turn.example.com -> VPS public IP.
    #   2. In Coolify, add turn.example.com as a domain on THIS service (issues the cert).
    #   3. Uncomment the `turn:` block in infra/livekit/livekit.yaml.
    #   4. Uncomment the labels below (set your real TURN hostname + Coolify's
    #      certresolver name — usually `letsencrypt`), then redeploy.
    # Because Traefik reaches TURN over the internal Docker network, 5349 is NOT
    # published to the host in this mode.
    # labels:
    #   - "traefik.tcp.routers.turn.rule=HostSNI(`turn.example.com`)"
    #   - "traefik.tcp.routers.turn.entrypoints=https"   # 443
    #   - "traefik.tcp.routers.turn.tls=true"
    #   - "traefik.tcp.routers.turn.tls.certresolver=letsencrypt"
    #   - "traefik.tcp.routers.turn.service=turn"
    #   - "traefik.tcp.services.turn.loadbalancer.server.port=5349"

  token-server:
    build:
      context: .
      dockerfile: services/token-server/Dockerfile
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      PORT: 3001
    # Internal only — the web app's nginx proxies /api/ to this service by name.
    expose:
      - "3001"
    depends_on:
      - livekit
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/demo/Dockerfile
    environment:
      # Coolify magic var: marks this service web-facing on port 80 and makes its domain
      # field appear in the Coolify UI (compose services get NO domain field otherwise).
      # Leave empty and set the real domain in the UI -> Coolify generates the Traefik
      # labels. This is the app's public URL, e.g. https://meet.example.com.
      SERVICE_FQDN_WEB_80: ""
      # Browser-facing signaling URL — must be wss:// from an HTTPS page.
      LIVEKIT_URL: ${LIVEKIT_URL}
    # Fronted by Traefik via the domain above — no host port binding (this is what fixes
    # the :8080 "port is already allocated" failure).
    expose:
      - "80"
    depends_on:
      - token-server
      - livekit
    restart: unless-stopped
