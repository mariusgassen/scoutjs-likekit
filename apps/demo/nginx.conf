server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy token requests to the token-server service.
  location /api/ {
    proxy_pass http://token-server:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Never cache the runtime config or the entry document.
  location = /config.js {
    add_header Cache-Control "no-store";
  }
  location = /index.html {
    add_header Cache-Control "no-store";
  }

  # Hashed bundles are immutable.
  location /prod/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
